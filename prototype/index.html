<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OJ Wheel Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>OJ Wheel Prototype</h1>
  <p>A simple conceptual visualisation of the OJ 10‑segment wheel.</p>

  <div id="wheel">
    <!-- 10 segments -->
    <div class="segment" style="--i:0;">1</div>
    <div class="segment" style="--i:1;">2</div>
    <div class="segment" style="--i:2;">3</div>
    <div class="segment" style="--i:3;">4</div>
    <div class="segment" style="--i:4;">5</div>
    <div class="segment" style="--i:5;">6</div>
    <div class="segment" style="--i:6;">7</div>
    <div class="segment" style="--i:7;">8</div>
    <div class="segment" style="--i:8;">9</div>
    <div class="segment" style="--i:9;">10</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
